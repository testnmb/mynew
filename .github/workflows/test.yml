name: ttest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 提前适配 Node.js 24，消除弃用警告

on:
  schedule:
    # 每天 UTC 时间 00:00 和 12:00 运行（如需每3小时一次，请改回 '0 0/3 * * *'）
    - cron: '0 0/3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch_streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests selenium

      - name: Run script
        run: |
          python TMP/ttest.py

      - name: List files in workspace (debug)
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== TMP directory ==="
          ls -la TMP/ || true

      # 确保 ttest.txt 存在于 TMP/ 目录下（如果脚本生成在根目录，则移动过去）
      - name: Ensure file is in TMP directory
        run: |
          if [ -f ttest.txt ]; then
            echo "Found ttest.txt in root, moving to TMP/"
            mv ttest.txt TMP/ttest.txt
          elif [ -f TMP/ttest.txt ]; then
            echo "ttest.txt already in TMP/"
          else
            echo "Error: ttest.txt not found in root or TMP/ directory"
            exit 1
          fi

      - name: Git status
        run: git status

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Commit and Push changes
        run: |
          git add TMP/ttest.txt
          git commit -m "Update TMP with new streams" --allow-empty
          git push origin HEAD:main   # 若默认分支为 master，请修改为 master

      - name: Upload streams file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ttest
          path: TMP/ttest.txt   # 修正为正确路径
