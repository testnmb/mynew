name: ttest

on:
  schedule:
    # 每 3 小时运行一次（UTC 时间 0,3,6,9,12,15,18,21）
    - cron: '0 0/3 * * *'
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 授予 GITHUB_TOKEN 写入权限

jobs:
  fetch_streams:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库代码（使用fetch-depth: 0确保获取完整历史）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install pandas requests selenium

      # 4. 运行生成脚本（应生成 TMP/ttest.txt）
      - name: Run script
        run: python TMP/ttest.py

      # 5. 确认文件已生成（若缺失则终止）
      - name: Verify file exists
        run: |
          if [ ! -f TMP/ttest.txt ]; then
            echo "错误：TMP/ttest.txt 未生成！"
            exit 1
          fi

      # 6. 配置 Git 用户信息（使用官方机器人账号）
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 7. 强制提交文件（无论内容是否有变化）
      - name: Force commit
        run: |
          # 添加文件到暂存区
          git add TMP/ttest.txt
          
          # 先尝试正常提交
          if git diff --staged --quiet; then
            echo "文件内容无变化，使用 --allow-empty 强制提交"
            git commit --allow-empty -m "Force update TMP/ttest.txt via GitHub Actions)"
          else
            echo "文件内容有变化，正常提交"
            git commit -m "Update TMP/ttest.txt via GitHub Actions)"
          fi

      # 8. 推送到远程仓库
      - name: Push changes
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          git push origin HEAD:$BRANCH_NAME

      # 9. 上传生成的文件作为工作流工件（便于下载检查）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ttest-output
          path: TMP/ttest.txt
