name: ttest

on:
  schedule:
    - cron: '0 0/3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch_streams:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pandas requests selenium

      - name: Run script
        run: python TMP/ttest.py

      - name: Verify file exists
        run: |
          if [ ! -f TMP/ttest.txt ]; then
            echo "错误：TMP/ttest.txt 未生成！"
            exit 1
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes to avoid conflicts
        run: |
          git pull --rebase origin ${{ github.ref_name }}

      - name: Force commit
        run: |
          git add TMP/ttest.txt
          if git diff --staged --quiet; then
            echo "文件内容无变化，使用 --allow-empty 强制提交"
            git commit --allow-empty -m "Force update TMP/ttest.txt via GitHub Actions"
          else
            echo "文件内容有变化，正常提交"
            git commit -m "Update TMP/ttest.txt via GitHub Actions"
          fi

      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ttest-output
          path: TMP/ttest.txt
